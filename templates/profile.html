<div id="profile" class="profile">
    <div id="personalinfo" class="personalinfo" style="grid-area:personalinfo">
        <form id="updateprofileform" class="updateprofileform" method="post" enctype="multipart/form-data">
            <!-- Action attribute specifies where to send the form data, method specifies the HTTP method (POST is recommended for sensitive data) -->

            <label for="fullnameupdate">Full Name:</label><br>
            <input type="text" id="fullnameupdate" name="fullnameupdate"><br>

            <label for="phone">Phone Number:</label><br>
            <input type="phone" id="phonenumberupdate" name="phonenumberupdate"><br>

            <label for="email">Email:</label><br>
            <input type="email" id="emailupdate" name="emailupdate"><br>

            <label for="password">Password:</label><br>
            <input type="password" id="passwordupdate" name="passwordupdate"><br>

            <label for="addressupdate">Address:</label><br>
            <input type="text" id="addressupdate" name="Address"><br>

            <!-- <label for="bio">Biography (optional):</label><br> -->
            <!-- <textarea id="bio" name="bio" rows="4" cols="50"></textarea><br> -->

            <label for="profile_picture">Upload Profile Picture:</label><br>
            <input style="display: grid; justify-self:center; justify-items:center; text-align:center; border:2px solid red;" type="file" id="profile_picture" name="profile_picture"><br>

            <input type="submit" value="Save Profile">
        </form>
    </div>
    <div style="grid-area:membershipinfo">jodijc</div>
    <div style="grid-area:paymentinfo">joidc</div>
</div>
